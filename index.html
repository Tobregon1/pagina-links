<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Página de enlaces oficial de Tobias Obregón. Encuentra mis redes sociales, libros y recursos de ingeniería.">
    <meta property="og:title" content="Tobias | Links">
    <meta property="og:description" content="Explora mis recursos, libros y redes sociales en un solo lugar.">
    <meta property="og:image" content="./assets/Logo T Tobias (fondo transparente)/2.png">
    <link rel="icon" href="./assets/Logo T Tobias (fondo transparente)/2.png" sizes="32x32">
    <link rel="apple-touch-icon" href="./assets/Logo T Tobias (fondo transparente)/2.png">
    <title>Tobias | Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <main class="container">
        <header class="top-nav">
            <div class="logo">
                <a href="./index.html">
                    <img src="./assets/Logo T Tobias (fondo transparente)/2.png" alt="Logo de Tobias">
                </a>
            </div>
            <div class="actions">
                <i class="fa-solid fa-arrow-up-from-bracket" id="share-btn" aria-label="Compartir enlace"
                    role="button"></i>
                <i class="fa-regular fa-sun" id="theme-toggle" aria-label="Cambiar tema de color" role="button"></i>
            </div>
        </header>

        <section class="profile">
            <img src="./assets/Tobias.jpg" alt="Foto de perfil de Tobias" class="profile-img">
            <h1 class="username">@tobiasobregon_</h1>
        </section>

        <section class="social-icons">
            <a href="https://www.instagram.com/tobiasobregon_/" data-label="Instagram" target="_blank"
                rel="noopener noreferrer" aria-label="Ir a Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://web.facebook.com/obregontobias11" data-label="Facebook" target="_blank"
                rel="noopener noreferrer" aria-label="Ir a Facebook">
                <i class="fa-brands fa-facebook"></i>
            </a>
            <a href="https://www.youtube.com/@tobiasobregon" class="youtube-container" data-label="YouTube"
                target="_blank" rel="noopener noreferrer" aria-label="Ir a YouTube">
                <i class="fa-brands fa-youtube"></i>
                <span class="subscribe-text">Suscribite ⤵</span>
            </a>
        </section>

        <section class="links">
            <a href="#" class="featured-link" aria-label="Curso de ingreso UTN">
                <img src="./assets/banner-utn.png" alt="Banner del curso de ingreso UTN" class="featured-img">
                <div class="featured-title">Así es el curso de ingreso UTN</div>
            </a>

            <a href="#" class="link-btn">
                <i class="fa-solid fa-link" aria-hidden="true"></i>
                <span>PROMPTS PARA LOS AGENTES DE IA</span>
            </a>

            <a href="#" class="link-btn">
                <i class="fa-solid fa-book" aria-hidden="true"></i>
                <span>LIBROS PARA ALGEBRA LINEAL</span>
            </a>

            <a href="#" class="link-btn">
                <i class="fa-solid fa-book" aria-hidden="true"></i>
                <span>EL MEJOR LIBRO DE FISICA 1</span>
            </a>

            <a href="#" class="link-btn">
                <i class="fa-solid fa-file-lines" aria-hidden="true"></i>
                <span>RECURSOS ANALISIS MATEMATICO 1</span>
            </a>
        </section>

        <footer class="footer-logo">
            <img src="./assets/Logo T Tobias (fondo transparente)/1.png" alt="Logo secundario de Tobias">
        </footer>
    </main>
    <script src="js/script.js"></script>
</body>

</html>
